services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: hes
      POSTGRES_PASSWORD: hes
      POSTGRES_DB: hes
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hes -d hes"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./backend
    ports:
      - "8000:8000"
      - "8766:8766"
    environment:
      DATABASE_URL: postgresql+asyncpg://hes:hes@db:5432/hes
      CORS_ORIGINS: http://localhost,http://127.0.0.1,http://localhost:5173,http://127.0.0.1:5173
    depends_on:
      db:
        condition: service_healthy

  web:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - api

volumes:
  pgdata:
