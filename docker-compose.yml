services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: hes
      POSTGRES_PASSWORD: hes
      POSTGRES_DB: hes
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hes -d hes"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./backend
    ports:
      - "8000:8000"
      - "8766:8766"
    environment:
      DATABASE_URL: postgresql+asyncpg://hes:hes@db:5432/hes
      CORS_ORIGINS: http://localhost,http://127.0.0.1,http://localhost:5173,http://127.0.0.1:5173
      DLMS_TCP_PORT: ${DLMS_TCP_PORT:-8766}
      DLMS_INTERFACE: ${DLMS_INTERFACE:-WRAPPER}
      DLMS_AUTHENTICATION: ${DLMS_AUTHENTICATION:-NONE}
      DLMS_PASSWORD: ${DLMS_PASSWORD:-}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)",
        ]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 60s

  web:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      api:
        condition: service_healthy

volumes:
  pgdata:
